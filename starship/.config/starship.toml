format = """
$directory\
$git_branch\
$git_status\
$git_state\
$elixir\
$nodejs\
$python\
$rust\
$golang\
$cmd_duration\
$line_break\
$character"""

right_format = """$time"""

command_timeout = 3000

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[✗](bold red)"

[directory]
truncation_length = 3
truncation_symbol = "…/"
style = "bold blue"
read_only = " 🔒"
read_only_style = "red"

[git_branch]
symbol = " "
style = "bold #cba6f7"
format = "[$symbol$branch(:$remote_branch)]($style) "

[git_status]
style = "bold red"
format = '([$all_status$ahead_behind]($style) )'
conflicted = "=${count} "
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
untracked = "?${count} "
stashed = "\\$${count} "
modified = "!${count} "
staged = "+${count} "
renamed = "»${count} "
deleted = "✘${count} "

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bold yellow"

[elixir]
symbol = " "
format = "[$symbol$version OTP $otp_version]($style) "
style = "bold #cba6f7"
detect_files = ["mix.exs"]
detect_folders = []
detect_extensions = []
version_format = "${raw}"

[nodejs]
symbol = " "
format = "[$symbol$version]($style) "
style = "bold green"
detect_files = ["package.json", ".node-version", ".nvmrc"]
detect_folders = ["node_modules"]

[python]
symbol = " "
format = "[$symbol$version( 🐍 $virtualenv)]($style) "
style = "bold yellow"
detect_folders = [".venv", "venv", "env", ".env", "virtualenv"]
detect_extensions = ["py"]

[rust]
symbol = " "
format = "[$symbol$version]($style) "
style = "bold #fab387"

[golang]
symbol = " "
format = "[$symbol$version]($style) "
style = "bold cyan"

[cmd_duration]
min_time = 2000
format = "[$duration]($style) "
style = "bold yellow"

[time]
disabled = false
format = "[$time]($style)"
style = "dimmed white"
time_format = "%H:%M:%S"
