# Picom config - transparent/hacker setup
# Uses glx backend for proper transparency support

backend = "glx";
vsync = true;

# Shadows
shadow = true;
shadow-radius = 7;
shadow-offset-x = -7;
shadow-offset-y = -7;
shadow-exclude = [
  "class_g = 'Polybar'",
  "class_g = 'kitty'",
  "name = 'Notice'"
];

# Fading
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;

# Transparency
detect-client-opacity = true;
detect-transient = true;
detect-rounded-corners = true;
use-damage = true;

# Opacity rules
opacity-rule = [
  # Polybar: slightly transparent to blend with wallpaper
  "95:class_g = 'Polybar'",
  # Kitty handles its own transparency via background_opacity
  # No rule needed - detect-client-opacity handles it
];

# Window type settings
wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 0.75; full-shadow = false; };
  dock = { shadow = false; };
  desktop = { shadow = false; };
  menu = { shadow = true; opacity = 0.95; };
  dropdown_menu = { shadow = true; opacity = 0.95; };
  popup_menu = { shadow = true; opacity = 0.95; };
  utility = { shadow = true; opacity = 0.95; };
};
