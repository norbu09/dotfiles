# kitty config
font_family MesloLGMDZ Nerd Font
font_size 11

# Enable font ligatures
ligatures yes

# Cursor
cursor_shape beam
cursor_beam_thickness 1.5

# Scrollback
scrollback_lines 10000

# Window
window_padding_width 8
draw_minimal_borders yes
hide_window_decorations yes

# Tab bar
tab_bar_edge top
tab_bar_style powerline
tab_title_template "{title}"

# Performance
repaint_delay 10
input_delay 3
sync_to_monitor yes

# Mouse
mouse_hide_wait 3

# Bell
enable_audio_bell no

# Remote control for theme switching (darkman)
listen_on unix:/tmp/kitty
allow_remote_control socket-only

# Background opacity - lets wallpaper show through for seamless hacker look
background_opacity 0.85
dynamic_background_opacity no

# Color scheme - loaded from active theme file (swapped by dark.sh/light.sh)
include colors.conf

# Links
visited_links consume
