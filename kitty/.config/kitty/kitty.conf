# kitty config
font_family MesloLGMDZ Nerd Font
font_size 11

# Enable font ligatures
ligatures yes

# Cursor
cursor_shape beam
cursor_beam_thickness 1.5

# Scrollback
scrollback_lines 10000

# Window
window_padding_width 8
draw_minimal_borders yes
hide_window_decorations yes

# Tab bar
tab_bar_edge top
tab_bar_style powerline
tab_title_template "{title}"

# Performance
repaint_delay 10
input_delay 3
sync_to_monitor yes

# Mouse
mouse_hide_wait 3

# Bell
enable_audio_bell no

# Background opacity - lets wallpaper show through for seamless hacker look
background_opacity 0.85
dynamic_background_opacity no

# Color scheme - Catppuccin Mocha
foreground #cdd6f4
background #1e1e2e

# Cursor colors
cursor #f5e0dc
cursor_text_color #1e1e2e

# Selection colors
selection_foreground #1e1e2e
selection_background #f5e0dc

# The basic colors
black #45475a
red #f38ba8
green #a6e3a1
yellow #f9e2af
blue #89b4fa
magenta #cba6f7
cyan #94e2d5
white #bac2de

# The bright colors
bright_black #585b70
bright_red #f38ba8
bright_green #a6e3a1
bright_yellow #f9e2af
bright_blue #89b4fa
bright_magenta #cba6f7
bright_cyan #94e2d5
bright_white #a6adc8

# URLs
url_color #89b4fa

# Search
search_match_no_1 #f9e2af
search_match_no_2 #f38ba8

# Process
active_tab_background #89b4fa
active_tab_foreground #1e1e2e
inactive_tab_background #45475a
inactive_tab_foreground #bac2de

# Splits
inactive_border_color #45475a
active_border_color #89b4fa

# Bell border
bell_border_color #f38ba8

# Dimmed text
dimmed_text_color #585b70

# Links
visited_links consume
