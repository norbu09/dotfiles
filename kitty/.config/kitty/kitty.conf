# kitty config
font_family MesloLGMDZ Nerd Font
font_size 11

# Enable font ligatures
ligatures yes

# Cursor
cursor_shape beam
cursor_beam_thickness 1.5

# Scrollback
scrollback_lines 10000

# Window
window_padding_width 8
draw_minimal_borders yes
hide_window_decorations yes

# Tab bar
tab_bar_edge top
tab_bar_style powerline
tab_title_template "{title}"

# Performance
repaint_delay 10
input_delay 3
sync_to_monitor yes

# Mouse
mouse_hide_wait 3

# Bell
enable_audio_bell no

# Background opacity - lets wallpaper show through for seamless hacker look
background_opacity 0.85
dynamic_background_opacity no

# Default color scheme (Catppuccin Mocha).
# Overridden at runtime by dark-theme.auto.conf / no-preference-theme.auto.conf
# when darkman toggles the OS color scheme via gsettings.
foreground #cdd6f4
background #1e1e2e

cursor #f5e0dc
cursor_text_color #1e1e2e

selection_foreground #1e1e2e
selection_background #f5e0dc

color0 #45475a
color1 #f38ba8
color2 #a6e3a1
color3 #f9e2af
color4 #89b4fa
color5 #cba6f7
color6 #94e2d5
color7 #bac2de

color8 #585b70
color9 #f38ba8
color10 #a6e3a1
color11 #f9e2af
color12 #89b4fa
color13 #cba6f7
color14 #94e2d5
color15 #a6adc8

url_color #89b4fa

search_match_no_1 #f9e2af
search_match_no_2 #f38ba8

active_tab_background #89b4fa
active_tab_foreground #1e1e2e
inactive_tab_background #45475a
inactive_tab_foreground #bac2de

inactive_border_color #45475a
active_border_color #89b4fa

bell_border_color #f38ba8

dimmed_text_color #585b70

# Links
visited_links consume
